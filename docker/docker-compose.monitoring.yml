# ==============================================================================
# Kairos - Docker Compose com Monitoramento
# ==============================================================================
# Uso:
#   docker compose -f docker-compose.monitoring.yml up -d
# ==============================================================================

version: "3.9"

services:
  # --- MCP Server -------------------------------------------------------------
  mcp-server:
    image: Kairos/mcp-server:${Kairos_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: Kairos-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      Kairos_DB_PATH: /data/data.sqlite
      Kairos_DATA_DIR: /data
      Kairos_SNAPSHOT_DIR: /data/snapshots
      Kairos_LOG_DIR: /data/logs
      MCP_PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - Kairos_data:/data
    ports:
      - "${MCP_PORT:-3000}:3000"
    healthcheck:
      test: [ "CMD", "node", "-e", "const fs=require('fs');try{fs.accessSync('/data',fs.constants.W_OK);process.exit(0)}catch(e){process.exit(1)}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - Kairos-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3000"
      - "prometheus.path=/metrics"

  # --- Prometheus -------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: Kairos-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - Kairos-network
    profiles:
      - monitoring

  # --- Grafana ----------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.2
    container_name: Kairos-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-Kairos}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - Kairos-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # --- Alertmanager -----------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: Kairos-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - Kairos-network
    profiles:
      - monitoring

volumes:
  Kairos_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  Kairos-network:
    driver: bridge
