# ==============================================================================
# Kairos - Docker Compose Development
# ==============================================================================
# Usage:
#   docker compose -f docker/docker-compose.dev.yml up -d
#   docker compose -f docker/docker-compose.dev.yml logs -f kairos
# ==============================================================================

services:
  kairos:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder
    container_name: kairos-dev
    command: ["pnpm", "dev"]
    environment:
      NODE_ENV: development
      KAIROS_DB_PATH: /data/data.sqlite
      KAIROS_DATA_DIR: /data
      KAIROS_SNAPSHOT_DIR: /data/snapshots
      KAIROS_LOG_DIR: /data/logs
      MCP_PORT: "3000"
      LOG_LEVEL: debug
      KAIROS_SNAPSHOT_RETENTION_DAYS: "3"
      KAIROS_SNAPSHOT_MAX_SIZE_MB: "25"
      KAIROS_DRY_RUN_DEFAULT: "false"
      KAIROS_DIFF_PREVIEW_MODE: "existing-only"
      KAIROS_COMMAND_CONFIRMATION: "destructive-only"
    volumes:
      - kairos_dev_data:/data
      # Live-reload: mount single src/ dir
      - ../src:/app/src:ro
    ports:
      - "3000:3000"
      - "9229:9229"
    networks:
      - kairos-network

volumes:
  kairos_dev_data:
    driver: local

networks:
  kairos-network:
    driver: bridge
