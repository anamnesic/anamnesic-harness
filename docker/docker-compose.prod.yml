# ==============================================================================
# Kairos - Docker Compose Production
# ==============================================================================

version: '3.8'

services:
  kairos:
    image: kairos:latest
    build:
      context: ..
      args:
        - KAIROS_VERSION=local
    container_name: kairos-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - KAIROS_DATA_DIR=/data
      - KAIROS_DB_PATH=/data/data.sqlite
      - KAIROS_SNAPSHOT_DIR=/data/snapshots
      - KAIROS_LOG_DIR=/data/logs
      - KAIROS_DRY_RUN_DEFAULT=${KAIROS_DRY_RUN_DEFAULT:-false}
      - KAIROS_DIFF_PREVIEW_MODE=${KAIROS_DIFF_PREVIEW_MODE:-existing-only}
      - KAIROS_COMMAND_CONFIRMATION=${KAIROS_COMMAND_CONFIRMATION:-destructive-only}
      - KAIROS_SNAPSHOT_RETENTION_DAYS=${KAIROS_SNAPSHOT_RETENTION_DAYS:-7}
      - KAIROS_SNAPSHOT_MAX_SIZE_MB=${KAIROS_SNAPSHOT_MAX_SIZE_MB:-100}
    volumes:
      - kairos_data:/data
    profiles:
      - api

  cli:
    image: kairos-cli:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.cli
      args:
        - KAIROS_VERSION=local
    volumes:
      - kairos_data:/data
      - ..:/workspace
    stdin_open: true
    tty: true
    profiles:
      - cli

volumes:
  kairos_data:
    name: kairos_data
