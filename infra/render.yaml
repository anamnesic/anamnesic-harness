services:
  - type: web
    name: kairos
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: kairos_GATEWAY_PORT
        value: "8080"
      - key: kairos_STATE_DIR
        value: /data/.kairos
      - key: kairos_WORKSPACE_DIR
        value: /data/workspace
      - key: kairos_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: kairos-data
      mountPath: /data
      sizeGB: 1
