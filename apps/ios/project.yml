name: kairos
options:
  bundleIdPrefix: ai.kairos
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  kairosKit:
    path: ../shared/kairosKit
  Swabble:
    path: ../../Swabble

schemes:
  kairos:
    shared: true
    build:
      targets:
        kairos: all
    test:
      targets:
        - kairosTests
        - kairosLogicTests
  kairosLogicTests:
    shared: true
    build:
      targets:
        kairosLogicTests: all
    test:
      targets:
        - kairosLogicTests

targets:
  kairos:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: kairosShareExtension
        embed: true
      - target: kairosActivityWidget
        embed: true
      - target: kairosWatchApp
      - package: kairosKit
      - package: kairosKit
        product: kairosChatUI
      - package: kairosKit
        product: kairosProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/kairosKit,$SRCROOT/../../Swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/kairos.entitlements
        CODE_SIGN_STYLE: "$(kairos_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(kairos_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(kairos_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(kairos_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          kairos_PUSH_TRANSPORT: direct
          kairos_PUSH_DISTRIBUTION: local
          kairos_PUSH_RELAY_BASE_URL: ""
          kairos_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          kairos_PUSH_TRANSPORT: direct
          kairos_PUSH_DISTRIBUTION: local
          kairos_PUSH_RELAY_BASE_URL: ""
          kairos_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: kairos
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.kairos.ios
            CFBundleURLSchemes:
              - kairos
        CFBundleShortVersionString: "$(kairos_MARKETING_VERSION)"
        kairosCanonicalVersion: "$(kairos_IOS_VERSION)"
        CFBundleVersion: "$(kairos_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.kairos.ios.bgrefresh
        NSLocalNetworkUsageDescription: kairos discovers and connects to your kairos gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _kairos-gw._tcp
        NSCameraUsageDescription: kairos can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: kairos uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: kairos can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: kairos needs microphone access for voice wake.
        NSMotionUsageDescription: kairos may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: kairos needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: kairos uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        kairosPushTransport: "$(kairos_PUSH_TRANSPORT)"
        kairosPushDistribution: "$(kairos_PUSH_DISTRIBUTION)"
        kairosPushRelayBaseURL: "$(kairos_PUSH_RELAY_BASE_URL)"
        kairosPushAPNsEnvironment: "$(kairos_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  kairosShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: kairosKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(kairos_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(kairos_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(kairos_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(kairos_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: kairos Share
        CFBundleShortVersionString: "$(kairos_MARKETING_VERSION)"
        CFBundleVersion: "$(kairos_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  kairosActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/kairosActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(kairos_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(kairos_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(kairos_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: kairos Activity
        CFBundleShortVersionString: "$(kairos_MARKETING_VERSION)"
        CFBundleVersion: "$(kairos_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  kairosWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: kairosWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(kairos_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(kairos_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(kairos_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(kairos_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(kairos_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(kairos_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: kairos
        CFBundleShortVersionString: "$(kairos_MARKETING_VERSION)"
        CFBundleVersion: "$(kairos_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(kairos_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  kairosWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(kairos_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(kairos_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(kairos_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(kairos_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(kairos_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(kairos_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: kairos
        CFBundleShortVersionString: "$(kairos_MARKETING_VERSION)"
        CFBundleVersion: "$(kairos_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(kairos_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  kairosTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: kairos
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(kairos_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(kairos_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.kairos.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/kairos.app/kairos"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: kairosTests
        CFBundleShortVersionString: "$(kairos_MARKETING_VERSION)"
        CFBundleVersion: "$(kairos_BUILD_VERSION)"

  kairosLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: kairosKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(kairos_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(kairos_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.kairos.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: kairosLogicTests
        CFBundleShortVersionString: "$(kairos_MARKETING_VERSION)"
        CFBundleVersion: "$(kairos_BUILD_VERSION)"
