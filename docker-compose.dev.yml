version: "3.9"

# Development environment with hot reload and debugging

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: thinkcoffee-mcp-dev
    command: ["pnpm", "dev:mcp"]
    environment:
      NODE_ENV: development
      THINKCOFFEE_DB_PATH: /data/data.sqlite
      THINKCOFFEE_DATA_DIR: /data
      LOG_LEVEL: debug
      THINKCOFFEE_DB_LOGGING: "true"
    volumes:
      - thinkcoffee_dev_data:/data
      # Live-reload: mount source for fast iteration
      - ./packages/core/src:/app/packages/core/src:ro
      - ./packages/mcp-server/src:/app/packages/mcp-server/src:ro
      - ./packages/cli/src:/app/packages/cli/src:ro
    ports:
      - "3000:3000"
      - "9229:9229"  # Node.js debugger
    networks:
      - thinkcoffee-network

volumes:
  thinkcoffee_dev_data:
    driver: local

networks:
  thinkcoffee-network:
    driver: bridge
