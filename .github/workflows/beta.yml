name: beta

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Git Committer
        id: setup-git-committer
        uses: ./.github/actions/setup-git-committer
        with:
          kairos-app-id: ${{ vars.kairos_APP_ID }}
          kairos-app-secret: ${{ secrets.kairos_APP_SECRET }}

      - name: Install kairos
        run: bun i -g kairos-ai

      - name: Sync beta branch
        env:
          GH_TOKEN: ${{ steps.setup-git-committer.outputs.token }}
          kairos_API_KEY: ${{ secrets.kairos_API_KEY }}
        run: bun scripts/beta.ts
