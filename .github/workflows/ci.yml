# ==============================================================================
# ThinkCoffee - CI Pipeline (V5 - Agent Safety Net)
# ==============================================================================
# Executa em: push para main/develop, pull requests
# Jobs: install, lint, typecheck, test-unit, test-safety-net, build, docker, security
# ==============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ----------------------------------------------------------------------------
  # Install and Cache Dependencies
  # ----------------------------------------------------------------------------
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

  # ----------------------------------------------------------------------------
  # Type Check
  # ----------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run TypeScript check
        run: pnpm ci:typecheck

  # ----------------------------------------------------------------------------
  # Unit Tests
  # ----------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run unit tests with coverage
        run: pnpm test:unit
        env:
          NODE_ENV: test
          THINKCOFFEE_DB_PATH: ":memory:"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ----------------------------------------------------------------------------
  # Safety Net Tests (Agent Safety Net specific)
  # ----------------------------------------------------------------------------
  test-safety-net:
    name: Safety Net Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run Safety Net service tests
        run: |
          pnpm exec vitest run \
            --reporter=verbose \
            packages/core/src/services/__tests__/ActionLogService.test.ts \
            packages/core/src/services/__tests__/SnapshotService.test.ts \
            packages/core/src/services/__tests__/RollbackService.test.ts \
            packages/core/src/utils/__tests__/safe-path.test.ts \
            packages/core/src/tools/__tests__/
        env:
          NODE_ENV: test

      - name: Run integration tests
        run: pnpm test
        env:
          NODE_ENV: test

  # ----------------------------------------------------------------------------
  # Build
  # ----------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test-unit, test-safety-net]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build all packages
        run: pnpm build

      - name: Verify build artifacts
        run: |
          test -f packages/core/dist/index.js || { echo "::error::core build missing"; exit 1; }
          test -f packages/cli/dist/index.js || { echo "::error::cli build missing"; exit 1; }
          test -f packages/mcp-server/dist/index.js || { echo "::error::mcp-server build missing"; exit 1; }
          echo "All build artifacts verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: packages/*/dist
          retention-days: 7

  # ----------------------------------------------------------------------------
  # Docker Build + Smoke Test
  # ----------------------------------------------------------------------------
  docker-build:
    name: Docker Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - name: mcp-server
            dockerfile: Dockerfile
          - name: cli
            dockerfile: Dockerfile.cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          load: true
          tags: thinkcoffee/${{ matrix.name }}:ci-${{ github.sha }}
          build-args: |
            THINKCOFFEE_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (${{ matrix.name }})
        if: matrix.name == 'mcp-server'
        run: |
          # Inicia container em background
          docker run -d \
            --name smoke-test \
            -e NODE_ENV=test \
            -e THINKCOFFEE_DB_PATH=/data/data.sqlite \
            -e THINKCOFFEE_DATA_DIR=/data \
            -e THINKCOFFEE_SNAPSHOT_DIR=/data/snapshots \
            -e THINKCOFFEE_LOG_DIR=/data/logs \
            -e THINKCOFFEE_SNAPSHOT_RETENTION_DAYS=7 \
            -e THINKCOFFEE_SNAPSHOT_MAX_SIZE_MB=50 \
            -e THINKCOFFEE_DRY_RUN_DEFAULT=false \
            -e THINKCOFFEE_DIFF_PREVIEW_MODE=existing-only \
            -e THINKCOFFEE_COMMAND_CONFIRMATION=destructive-only \
            -p 3000:3000 \
            thinkcoffee/${{ matrix.name }}:ci-${{ github.sha }}

          echo "Waiting for container to start..."
          sleep 15

          # Verifica se container esta rodando
          docker ps | grep smoke-test || { echo "::error::Container not running"; docker logs smoke-test; exit 1; }

          # Verifica diretorios Safety Net
          docker exec smoke-test ls -la /data/snapshots || { echo "::error::Snapshots dir missing"; exit 1; }
          docker exec smoke-test ls -la /data/logs || { echo "::error::Logs dir missing"; exit 1; }

          # Verifica env vars do Safety Net
          docker exec smoke-test printenv | grep THINKCOFFEE_SNAPSHOT_DIR || { echo "::error::SNAPSHOT_DIR env not set"; exit 1; }
          docker exec smoke-test printenv | grep THINKCOFFEE_LOG_DIR || { echo "::error::LOG_DIR env not set"; exit 1; }

          # Health check (com retry)
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "::warning::Health check did not pass (may not be implemented yet)"
            fi
            sleep 2
          done

          echo "Smoke test passed"
          docker stop smoke-test && docker rm smoke-test

      - name: Smoke test CLI
        if: matrix.name == 'cli'
        run: |
          docker run --rm thinkcoffee/${{ matrix.name }}:ci-${{ github.sha }} --help || echo "::warning::CLI help command failed"
          echo "CLI smoke test passed"

  # ----------------------------------------------------------------------------
  # Security Scan
  # ----------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          pnpm audit --json > audit-report.json 2>/dev/null || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit
          path: audit-report.json
          retention-days: 30
