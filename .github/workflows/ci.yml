name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm ci:install

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm ci:typecheck

      - name: Test
        run: pnpm test:unit

  docker_build_mcp:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build MCP Docker image
        run: docker build -f Dockerfile -t thinkcoffee/mcp-server:latest .

      - name: Build CLI Docker image
        run: docker build -f Dockerfile.cli -t thinkcoffee/cli:latest .
