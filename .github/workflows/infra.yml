name: Infrastructure Setup

on:
  workflow_dispatch:
    inputs:
      build_images:
        description: "Build Docker images"
        required: false
        default: "false"
        type: boolean
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  setup:
    name: Setup Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate infrastructure
        run: |
          echo "Running infrastructure validation..."
          node scripts/setup-infrastructure.js
          if [ -f setup-infrastructure-report.json ]; then
            echo "Infrastructure report generated"
            cat setup-infrastructure-report.json
          fi

      - name: Validate Docker Compose
        run: |
          docker-compose config
          echo "✓ Docker Compose configuration is valid"

      - name: Setup Docker Buildx
        if: ${{ github.event.inputs.build_images == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ github.event.inputs.build_images == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MCP Server image
        if: ${{ github.event.inputs.build_images == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/mcp-server:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CLI image
        if: ${{ github.event.inputs.build_images == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cli
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/cli:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/cli:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload infrastructure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-report
          path: setup-infrastructure-report.json
          retention-days: 30

  docker-validate:
    name: Validate Docker Setup
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Dockerfiles
        run: |
          echo "Checking Dockerfile syntax..."
          docker run --rm -i hadolint/hadolint < Dockerfile
          docker run --rm -i hadolint/hadolint < Dockerfile.cli
          echo "✓ Dockerfiles are valid"

      - name: Check Docker security best practices
        run: |
          echo "Validating Docker security practices..."
          
          # Check for non-root user
          if grep -q "USER" Dockerfile; then
            echo "✓ Non-root user configured"
          else
            echo "⚠ Warning: No non-root user specified"
          fi
          
          # Check for health checks
          if grep -q "HEALTHCHECK" Dockerfile; then
            echo "✓ Health checks configured"
          else
            echo "⚠ Warning: No health checks specified"
          fi

  env-validate:
    name: Validate Environment Variables
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify environment files
        run: |
          echo "Checking environment configuration files..."
          
          files=(".env.example" ".env.staging" ".env.test")
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Found $file"
              # Validate format (KEY=VALUE)
              grep -E '^[A-Z_]+=.*$' "$file" | wc -l | xargs echo "  - Variables defined:"
            else
              echo "⚠ Warning: $file not found"
            fi
          done

      - name: Check for secrets in git history
        run: |
          echo "Scanning for secrets..."
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose
          else
            echo "⚠ gitleaks not available for secret scanning"
          fi

  scripts-validate:
    name: Validate Deployment Scripts
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deployment scripts
        run: |
          echo "Checking deployment scripts..."
          
          scripts=(
            "scripts/deploy.sh"
            "scripts/health-check.sh"
            "scripts/backup.sh"
            "scripts/rollback.sh"
          )
          
          for script in "${scripts[@]}"; do
            if [ -f "$script" ]; then
              echo "✓ Found $script"
              bash -n "$script" && echo "  - Syntax OK" || echo "  - Syntax ERROR"
            else
              echo "⚠ Warning: $script not found"
            fi
          done

  summary:
    name: Infrastructure Setup Summary
    runs-on: ubuntu-latest
    needs: [docker-validate, env-validate, scripts-validate]
    if: always()

    steps:
      - name: Download infrastructure report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: infrastructure-report
          path: .

      - name: Generate summary
        if: always()
        run: |
          echo "## Infrastructure Setup Report" >> $GITHUB_STEP_SUMMARY
          
          if [ -f setup-infrastructure-report.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat setup-infrastructure-report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All infrastructure validation checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Some infrastructure validation checks failed. Please review the logs above." >> $GITHUB_STEP_SUMMARY
          fi
