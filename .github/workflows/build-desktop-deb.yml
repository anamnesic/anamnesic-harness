name: Build Desktop .deb

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - "packages/desktop/**"
      - "packages/kairoscode/**"
      - "packages/ui/**"
      - ".github/workflows/build-desktop-deb.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build-deb:
    name: Build Linux x64 .deb
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "true"
          install-deps: "true"
          frozen-lockfile: "true"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          key: x86_64-unknown-linux-gnu

      - name: Build kairos CLI sidecar binary
        run: |
          mkdir -p packages/desktop/src-tauri/sidecars
          bun build packages/kairoscode/src/index.ts \
            --compile \
            --target=bun-linux-x64 \
            --outfile packages/desktop/src-tauri/sidecars/kairos-cli-x86_64-unknown-linux-gnu
          chmod +x packages/desktop/src-tauri/sidecars/kairos-cli-x86_64-unknown-linux-gnu

      - name: Build frontend
        run: |
          cd packages/desktop
          pnpm build

      - name: Build Tauri .deb
        run: |
          cd packages/desktop
          pnpm tauri build --target x86_64-unknown-linux-gnu --bundles deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: kairos-desktop-linux-x64-deb
          path: packages/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: error
