# ==============================================================================
# ThinkCoffee - CD Pipeline (V4 - Agent Safety Net)
# ==============================================================================
# Triggers:
#   - Push tag v*.*.* -> Deploy to production
#   - Push to develop -> Deploy to staging
#   - Manual dispatch -> Select environment
#
# V4 changes:
#   - Validates Safety Net dirs (snapshots, logs) post-deploy
#   - Smoke test verifica Safety Net env vars
#   - Concurrent deploys bloqueados por environment lock
#   - Rollback automatico com snapshot verification
# ==============================================================================

name: CD

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version to deploy (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ----------------------------------------------------------------------------
  # Determine Environment & Version
  # ----------------------------------------------------------------------------
  setup:
    name: Setup Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      version: ${{ steps.resolve.outputs.version }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      timestamp: ${{ steps.resolve.outputs.timestamp }}
    steps:
      - name: Resolve deployment parameters
        id: resolve
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            VER="${{ github.event.inputs.version }}"
            if [[ "$VER" == "latest" ]]; then
              VER="${{ github.sha }}"
            fi
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="production"
            VER="${GITHUB_REF#refs/tags/}"
          else
            ENV="staging"
            VER="${{ github.sha }}"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VER" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          echo "==============================="
          echo "Environment: $ENV"
          echo "Version:     $VER"
          echo "Timestamp:   $TIMESTAMP"
          echo "==============================="

  # ----------------------------------------------------------------------------
  # Build and Push Docker Images
  # ----------------------------------------------------------------------------
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: mcp-server
            dockerfile: Dockerfile
            suffix: ""
          - target: cli
            dockerfile: Dockerfile.cli
            suffix: "-cli"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}:${{ needs.setup.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}:latest
          build-args: |
            THINKCOFFEE_VERSION=${{ needs.setup.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------------------
  # Deploy to Environment
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, build-push]
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set environment-specific config
        id: config
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          if [[ "$ENV" == "production" ]]; then
            echo "log_level=info" >> $GITHUB_OUTPUT
            echo "snapshot_retention=30" >> $GITHUB_OUTPUT
            echo "snapshot_max_mb=200" >> $GITHUB_OUTPUT
            echo "dry_run_default=false" >> $GITHUB_OUTPUT
            echo "diff_preview=existing-only" >> $GITHUB_OUTPUT
            echo "cmd_confirm=destructive-only" >> $GITHUB_OUTPUT
          else
            echo "log_level=debug" >> $GITHUB_OUTPUT
            echo "snapshot_retention=7" >> $GITHUB_OUTPUT
            echo "snapshot_max_mb=50" >> $GITHUB_OUTPUT
            echo "dry_run_default=false" >> $GITHUB_OUTPUT
            echo "diff_preview=existing-only" >> $GITHUB_OUTPUT
            echo "cmd_confirm=destructive-only" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/thinkcoffee

            echo "=== Pre-deploy ==="

            # Backup (production only)
            if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
              echo "Creating pre-deploy backup..."
              ./scripts/backup.sh pre-deploy-${{ needs.setup.outputs.timestamp }} || echo "Backup warning (continuing)"
            fi

            echo "=== Pulling images ==="
            export THINKCOFFEE_VERSION="${{ needs.setup.outputs.version }}"
            docker compose pull

            echo "=== Deploying ==="
            export NODE_ENV="${{ needs.setup.outputs.environment }}"
            export LOG_LEVEL="${{ steps.config.outputs.log_level }}"
            export THINKCOFFEE_SNAPSHOT_RETENTION_DAYS="${{ steps.config.outputs.snapshot_retention }}"
            export THINKCOFFEE_SNAPSHOT_MAX_SIZE_MB="${{ steps.config.outputs.snapshot_max_mb }}"
            export THINKCOFFEE_DRY_RUN_DEFAULT="${{ steps.config.outputs.dry_run_default }}"
            export THINKCOFFEE_DIFF_PREVIEW_MODE="${{ steps.config.outputs.diff_preview }}"
            export THINKCOFFEE_COMMAND_CONFIRMATION="${{ steps.config.outputs.cmd_confirm }}"
            docker compose up -d --remove-orphans

            echo "=== Verifying Safety Net storage ==="
            docker exec thinkcoffee-mcp ls -la /data/snapshots /data/logs || echo "Safety Net dirs will be created on first use"

            echo "=== Health check ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "FATAL: Health check failed after 30 attempts"
                docker compose logs --tail=50 mcp-server
                exit 1
              fi
              sleep 2
            done

            echo "=== Cleanup ==="
            docker image prune -f --filter "until=48h"
            echo "Deploy complete: ${{ needs.setup.outputs.version }}"

  # ----------------------------------------------------------------------------
  # Post-Deploy Verification
  # ----------------------------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    steps:
      - name: Wait for stabilization
        run: sleep 30

      - name: Health check
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "::warning::DEPLOY_URL secret not configured -- skipping remote health check"
            exit 0
          fi

          for i in {1..10}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Remote health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/10 -- HTTP $HTTP_CODE"
            sleep 10
          done
          echo "::error::Remote health check failed"
          exit 1

      - name: Announce success
        if: success()
        run: |
          echo "=== Deployment Successful ==="
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Version:     ${{ needs.setup.outputs.version }}"
          echo "Timestamp:   ${{ needs.setup.outputs.timestamp }}"
          echo "=============================="

  # ----------------------------------------------------------------------------
  # Rollback on Failure (production only)
  # ----------------------------------------------------------------------------
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [setup, deploy, verify]
    if: failure() && needs.setup.outputs.environment == 'production'
    steps:
      - name: Execute rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/thinkcoffee
            echo "ROLLBACK TRIGGERED for deploy ${{ needs.setup.outputs.timestamp }}"

            # Tentar rollback pelo backup da pre-deploy
            BACKUP_TAG="pre-deploy-${{ needs.setup.outputs.timestamp }}"
            BACKUP_FILE=$(ls -1t backups/thinkcoffee_${BACKUP_TAG}*.tar.gz 2>/dev/null | head -1)

            if [[ -n "$BACKUP_FILE" ]]; then
              echo "Rolling back using: $BACKUP_FILE"
              ./scripts/restore.sh "$BACKUP_FILE" <<< "yes"
            else
              echo "No matching backup found -- rolling back to latest available"
              ./scripts/restore.sh latest <<< "yes"
            fi

            echo "Rollback completed"
