version: '3.8'

services:
  # Aplicacao principal
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thinkcoffee-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-thinkcoffee}
      DB_USER: ${DB_USER:-thinkcoffee_user}
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      DATABASE_URL: postgres://${DB_USER:-thinkcoffee_user}:${DB_PASSWORD:-devpassword}@postgres:5432/${DB_NAME:-thinkcoffee}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredispassword}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev-refresh-secret-change-in-prod}
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules
    
    networks:
      - thinkcoffee-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: thinkcoffee-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-thinkcoffee}
      POSTGRES_USER: ${DB_USER:-thinkcoffee_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    ports:
      - "5432:5432"
    
    networks:
      - thinkcoffee-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-thinkcoffee_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: thinkcoffee-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devredispassword}
    
    volumes:
      - redis_data:/data
    
    ports:
      - "6379:6379"
    
    networks:
      - thinkcoffee-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (Development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: thinkcoffee-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@thinkcoffee.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    
    ports:
      - "5050:80"
    
    networks:
      - thinkcoffee-network
    
    restart: unless-stopped
    
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  thinkcoffee-network:
    driver: bridge
