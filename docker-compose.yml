version: "3.9"

services:
  # --- MCP Server (Production) -----------------------------------------------
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: thinkcoffee/mcp-server:latest
    container_name: thinkcoffee-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      THINKCOFFEE_DB_PATH: /data/data.sqlite
      THINKCOFFEE_DATA_DIR: /data
    volumes:
      - thinkcoffee_data:/data
    ports:
      - "${MCP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').accessSync('/data', require('fs').constants.W_OK)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - thinkcoffee-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  thinkcoffee_data:
    driver: local

networks:
  thinkcoffee-network:
    driver: bridge
